name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Install Agent Skills validator
        run: python -m pip install skills-ref
      - name: Validate Agent Skills package
        run: agentskills validate skills/ob-methods-results-check

      - name: Reject tracked generated artifacts
        run: |
          if git ls-files | grep -E '(^|/)(__pycache__|audit-reports)(/|$)|\.pyc$|\.html$'; then
            echo "Tracked generated artifacts found"
            exit 1
          fi
